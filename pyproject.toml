[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "eagle"
version = "0.1.0"
description = "EAGLE research code with a vendored MicroRTS environment"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["eagle*", "scripts*"]
