seed_prompts:
  - "Generate a simple Java MicroRTS agent that extends RandomBiasedAI and never calls an LLM at runtime."
  - "Generate a conservative Java MicroRTS agent with a valid UnitTypeTable constructor."
generations: 50
population_size: 10
elite_count: 1
generation_backend: "llama_cpp"
llm_base_url: "http://127.0.0.1:8080"
llm_model: "local"
microrts_dir: "third_party/microrts"
runs_dir: "runs"
tick_limit: 100
opponent: "ai.RandomBiasedAI"
matches_per_candidate: 1
mock_score_base: 10
mock_score_step: 1
