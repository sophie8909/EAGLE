seed_prompts:
  - "Generate a Java MicroRTS agent that prioritizes economy first, then transitions into light-unit pressure without runtime LLM calls."
  - "Generate a Java MicroRTS agent that defends its base, keeps workers alive, and counterattacks only after stabilizing."
  - "Generate a Java MicroRTS agent that rushes early with compact, deterministic Java code."
  - "Generate a Java MicroRTS agent that balances worker production, barracks timing, and local tactical pressure."
generations: 10
population_size: 50
crossover_rate: 0.75
mutation_rate: 0.85
random_seed: 7
generation_backend: "llama_cpp"
alignment_backend: "llama_cpp"
llm_base_url: "http://localhost:8080"
llm_model: "local-model"
microrts_dir: "third_party/microrts"
runs_dir: "runs"
tick_limit: 3000
opponent: "ai.RandomBiasedAI"
matches_per_candidate: 3
mock_score_base: 10
mock_score_step: 1

